<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MBTI × 怪物猎人荒野 — 你的专属武器</title>
<style>
:root {
  --red: #b6302a;
  --red-dim: rgba(182, 48, 42, .45);
  --gold: #deb970;
  --gold-dim: rgba(222, 185, 112, .5);
  --gold-faint: rgba(222, 185, 112, .18);
  --bg: #171515;
  --card-bg: rgba(255,255,255,.045);
  --card-bg-hover: rgba(255,255,255,.075);
  --card-bg-deep: rgba(255,255,255,.065);
  --border: rgba(245,240,232,.12);
  --border-hover: rgba(245,240,232,.25);
  --border-gold: rgba(222,185,112,.45);
  --text: #f5f0e8;
  --text-dim: #cfc3b0;
  --accent-ei: #c06050;
  --accent-sn: #5095b0;
  --accent-tf: #509560;
  --accent-jp: #9070b0;
  --radius: 8px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
  background:
    linear-gradient(135deg, rgba(182,48,42,.18), transparent 35%),
    radial-gradient(circle at 78% 10%, rgba(222,185,112,.12), transparent 28%),
    var(--bg);
  color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  display: flex; justify-content: center; align-items: center;
  line-height: 1.6; overflow-x: hidden;
}

#app {
  width: 100%; max-width: 560px;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; position: relative;
}

/* ===== Hero Screen ===== */
#hero {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 36px 20px; gap: 20px;
}

.palico-svg {
  width: 120px; height: 120px;
  filter: drop-shadow(0 4px 16px rgba(100,90,140,.35));
  animation: palicoFloat 3s ease-in-out infinite;
}
@keyframes palicoFloat {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
  60% { transform: translateY(0); }
  80% { transform: translateY(-4px); }
}

.hero-title {
  font-size: 28px; font-weight: 800; color: var(--text);
  letter-spacing: 1px;
}
.hero-title em { font-style: normal; color: var(--gold); }
.hero-subtitle {
  font-size: 14px; color: var(--text-dim); max-width: 300px;
}

.weapon-preview-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px; max-width: 400px; width: 100%;
}
.wp-tile {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 12px 8px 10px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: default;
  transition: all .2s;
}
.wp-tile:hover { background: var(--card-bg-hover); border-color: var(--border-hover); }
.wp-tile img {
  width: 44px; height: 44px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.35));
  opacity: .75; transition: opacity .2s;
}
.wp-tile:hover img { opacity: 1; }
.wp-tile .wp-name {
  font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
}
.wp-logo-tile {
  display: flex; align-items: center; justify-content: center;
  grid-column: span 2;
  padding: 12px 8px;
}
.wp-logo-tile .mhw-logo-text {
  font-size: 16px; font-weight: 800; color: var(--gold);
  letter-spacing: 2px; opacity: .6;
  font-family: Inter, "Microsoft YaHei", sans-serif;
}

.btn-start {
  margin-top: 4px; padding: 15px 52px; font-size: 17px; font-weight: 700;
  background: rgba(222,185,112,.15); color: var(--gold);
  border: 1px solid rgba(222,185,112,.35); border-radius: 6px;
  cursor: pointer; letter-spacing: 1px;
  transition: all .25s;
}
.btn-start:hover { background: rgba(222,185,112,.25); border-color: var(--gold); }
.btn-start:active { transform: scale(.97); }

/* ===== Quiz Section ===== */
#quiz {
  flex: 1; display: none; flex-direction: column; padding: 28px 20px;
}
.progress-bar-outer {
  width: 100%; height: 4px;
  background: rgba(245,240,232,.08); border-radius: 2px; overflow: hidden;
}
.progress-bar-inner {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--red-dim), var(--gold));
  transition: width .4s ease;
}
.progress-text {
  text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 8px;
}

.question-card {
  flex: 1; display: flex; flex-direction: column;
  animation: fadeSlideIn .35s ease;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-number {
  font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px;
  text-transform: uppercase;
}
.q-text {
  font-size: 20px; font-weight: 600; color: var(--text);
  margin-bottom: 24px; line-height: 1.5;
}

.options { display: flex; flex-direction: column; gap: 8px; }

.opt-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: all .18s; font-size: 14px; color: var(--text-dim);
}
.opt-btn:hover { border-color: var(--border-hover); background: var(--card-bg-hover); color: var(--text); }
.opt-btn.selected {
  border-color: var(--border-gold); background: rgba(222,185,112,.08);
  color: var(--gold); box-shadow: 0 0 12px rgba(222,185,112,.06);
}
.opt-btn .opt-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid rgba(245,240,232,.18); transition: all .18s; flex-shrink: 0;
}
.opt-btn.selected .opt-dot {
  border-color: var(--gold); background: var(--gold);
  box-shadow: 0 0 6px rgba(222,185,112,.3);
}

.quiz-nav { display: flex; gap: 10px; margin-top: 24px; padding-bottom: var(--safe-b); }
.btn-back, .btn-next {
  padding: 11px 24px; font-size: 14px; font-weight: 600;
  border-radius: 6px; cursor: pointer; transition: all .2s; border: none;
}
.btn-back {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-back:hover { border-color: var(--border-hover); color: var(--text); }
.btn-next {
  flex: 1; background: rgba(222,185,112,.15); color: var(--gold);
  border: 1px solid rgba(222,185,112,.25);
}
.btn-next:disabled { opacity: .25; cursor: not-allowed; }
.btn-next:not(:disabled):hover { background: rgba(222,185,112,.25); }

/* ===== Result Section ===== */
#result {
  flex: 1; display: none; flex-direction: column;
  padding: 28px 20px 40px; gap: 20px;
  animation: fadeSlideIn .5s ease;
}

.result-header { text-align: center; }
.mbti-type-badge {
  display: inline-block; padding: 8px 22px;
  background: rgba(222,185,112,.08); border: 1px solid rgba(222,185,112,.25);
  border-radius: 6px; font-size: 30px; font-weight: 800;
  letter-spacing: 5px; color: var(--gold);
}
.mbti-name { font-size: 16px; color: var(--text); margin-top: 8px; letter-spacing: 1px; }

.dim-bars {
  display: flex; flex-direction: column; gap: 8px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
}
.dim-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.dim-label-left, .dim-label-right {
  width: 18px; text-align: center; font-weight: 700; flex-shrink: 0;
}
.dim-label-left { color: var(--text-dim); }
.dim-label-right { color: var(--text); }
.dim-bar-track {
  flex: 1; height: 6px; background: rgba(245,240,232,.08); border-radius: 3px; overflow: hidden;
}
.dim-bar-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }
.dim-bar-fill.ei { background: var(--accent-ei); }
.dim-bar-fill.sn { background: var(--accent-sn); }
.dim-bar-fill.tf { background: var(--accent-tf); }
.dim-bar-fill.jp { background: var(--accent-jp); }
.dim-percent { width: 40px; text-align: right; font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

.mbti-desc {
  font-size: 14px; color: var(--text-dim); line-height: 1.7;
  text-align: center; padding: 0 6px;
}

.section-divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--gold); font-size: 13px; font-weight: 600; letter-spacing: 1px;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(222,185,112,.25), transparent);
}

.weapon-card {
  background: var(--card-bg-deep); border: 1px solid var(--border-gold);
  border-radius: var(--radius); padding: 22px 18px; text-align: center;
  position: relative; box-shadow: 0 4px 24px rgba(0,0,0,.2);
}
.weapon-card .match-badge {
  position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
  padding: 4px 14px; background: var(--gold); color: var(--bg);
  border-radius: 4px; font-size: 12px; font-weight: 700; letter-spacing: 1px;
}

.weapon-icon-wrap {
  width: 96px; height: 96px; margin: 14px auto 10px;
  display: flex; align-items: center; justify-content: center;
}
.weapon-icon-wrap img {
  width: 100%; height: 100%;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,.4));
}
.weapon-name {
  font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: 2px;
}
.weapon-name-en {
  font-size: 12px; color: var(--text-dim); margin-top: 2px;
}

.weapon-reason {
  margin-top: 14px; font-size: 14px; color: var(--text); line-height: 1.7;
  text-align: left; padding: 12px 14px;
  background: rgba(255,255,255,.03); border-radius: 6px;
  border-left: 2px solid var(--gold-dim);
}
.weapon-meme {
  margin-top: 10px; font-size: 13px; color: #d4a860; line-height: 1.6;
  text-align: left; padding: 12px 14px;
  background: rgba(222,185,112,.05); border-radius: 6px;
  border-left: 2px solid rgba(222,185,112,.4); font-style: italic;
}

.weapon-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
.tag {
  padding: 3px 12px; background: rgba(222,185,112,.08);
  border: 1px solid rgba(222,185,112,.2); border-radius: 4px;
  font-size: 11px; color: var(--gold);
}

.alt-weapons { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.alt-weapons span { color: var(--gold); font-weight: 600; }

.btn-row { display: flex; gap: 10px; }
.btn-retry, .btn-share {
  flex: 1; padding: 12px; font-size: 14px; font-weight: 600;
  border-radius: 6px; cursor: pointer; transition: all .2s; border: none;
}
.btn-retry {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-retry:hover { border-color: var(--border-hover); color: var(--text); }
.btn-share {
  background: rgba(222,185,112,.15); color: var(--gold);
  border: 1px solid rgba(222,185,112,.25);
}
.btn-share:hover { background: rgba(222,185,112,.25); }

.footer {
  text-align: center; font-size: 11px; color: var(--text-dim);
  opacity: .5; padding-bottom: var(--safe-b);
}

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 9px 20px; background: var(--gold); color: var(--bg);
  border-radius: 6px; font-size: 13px; font-weight: 600;
  z-index: 999; animation: toastIn .3s ease; pointer-events: none;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ===== Responsive ===== */
@media (max-width: 400px) {
  .hero-title { font-size: 24px; }
  .q-text { font-size: 18px; }
  .mbti-type-badge { font-size: 26px; letter-spacing: 3px; }
  .weapon-name { font-size: 21px; }
  .weapon-preview-grid { gap: 6px; grid-template-columns: repeat(4, 1fr); }
  .wp-tile { padding: 10px 4px 8px; }
  .wp-tile img { width: 36px; height: 36px; }
  .wp-tile .wp-name { font-size: 10px; }
  .wp-logo-tile .mhw-logo-text { font-size: 13px; }
  .palico-svg { width: 100px; height: 100px; }
}
@media (max-width: 340px) {
  .weapon-preview-grid { gap: 4px; }
  .wp-tile img { width: 30px; height: 30px; }
  .wp-tile .wp-name { font-size: 9px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- ===== HERO ===== -->
  <section id="hero">
    <img class="palico-svg" src="assets/palico-daicat.svg" alt="艾露猫" width="120" height="120">
    <h1 class="hero-title">狩魂<em>性格</em>检定</h1>
    <p class="hero-subtitle">40道题 · 4个维度 · 艾露猫为你找到《怪物猎人：荒野》中的命定之武器</p>

    <button class="btn-start" onclick="startQuiz()">开始测试</button>

      <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section id="result"></section>

</div>

const TOTAL = questions.length;
let currentQuestion = 0;
let answers = new Array(TOTAL).fill(null); // null or -3..+3

// ==================== HELPERS ====================
function getMbtiType(dimScores) {
  // 0分视为均衡，标记为X（UI上显示为斜杠或说明）
  let type = '';
  type += dimScores.ei < 0 ? 'I' : dimScores.ei > 0 ? 'E' : 'X';
  type += dimScores.sn < 0 ? 'S' : dimScores.sn > 0 ? 'N' : 'X';
  type += dimScores.tf < 0 ? 'T' : dimScores.tf > 0 ? 'F' : 'X';
  type += dimScores.jp < 0 ? 'J' : dimScores.jp > 0 ? 'P' : 'X';
  return type;
}

function calcDimScores() {
  const scores = { ei: 0, sn: 0, tf: 0, jp: 0 };
  answers.forEach((ans, i) => {
    if (ans === null) return;
    const dim = questions[i].dim;
    scores[dim] += ans;
  });
  return scores;
}

function cosineSimilarity(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  if (magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function findBestWeapon(dimScores) {
  const userVec = [dimScores.ei, dimScores.sn, dimScores.tf, dimScores.jp];

  // 全零向量时所有武器相似度相同，取第一把无意义
  const allZero = userVec.every(v => v === 0);
  if (allZero) return null;

  let best = null, bestSim = -Infinity;
  const allMatches = [];

  weapons.forEach(w => {
    const sim = cosineSimilarity(userVec, w.vector);
    allMatches.push({ weapon: w, similarity: sim });
    if (sim > bestSim) { bestSim = sim; best = w; }
  });

  allMatches.sort((a, b) => b.similarity - a.similarity);

  // 余弦相似度范围-1..1，映射到50%..100%（加clamp保险）
  const simToPercent = (sim) => Math.max(0, Math.min(100, Math.round(50 + sim * 50)));

  return {
    primary: best,
    primaryPct: simToPercent(bestSim),
    alts: allMatches.slice(1, 3).map(m => ({
      weapon: m.weapon,
      pct: simToPercent(m.similarity),
    })),
  };
}

  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

// ==================== RENDER ====================
function renderHero() {
  document.getElementById('hero').style.display = 'flex';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function renderQuiz() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const answered = answers[currentQuestion];
  const card = document.getElementById('questionCard');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  progressBar.style.width = ((currentQuestion + 1) / TOTAL * 100) + '%';
  progressText.textContent = (currentQuestion + 1) + ' / ' + TOTAL;

  btnBack.style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
  btnNext.disabled = answered === null;
  btnNext.textContent = currentQuestion === TOTAL - 1 ? '查看结果 ✨' : '下一题 →';

  const labels = ['非常不同意', '不同意', '有点不同意', '中立', '有点同意', '同意', '非常同意'];

  card.innerHTML = `
    <div class="q-number">第 ${currentQuestion + 1} 题</div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${labels.map((label, i) => {
        const value = i - 3; // -3 to +3
        const sel = answered === value ? ' selected' : '';
        return `<div class="opt-btn${sel}" data-value="${value}">
          <span>${label}</span>
          <div class="opt-dot"></div>
        </div>`;
      }).join('')}
    </div>
  `;

  // Bind option clicks — auto-advance to next question
  card.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = parseInt(btn.dataset.value);
      answers[currentQuestion] = val;
      setTimeout(() => nextQuestion(), 180); // 短暂延迟让用户看到选中效果再跳转
    });
  });
}

function renderResult() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'flex';

  const dimScores = calcDimScores();
  const mbtiType = getMbtiType(dimScores);
  // 若有X维度，用不含X的最近类型匹配描述；找不到则用通用描述
  const cleanType = mbtiType.replace(/X/g, '');
  const desc = mbtiDescriptions[mbtiType] || mbtiDescriptions[cleanType] ||
    '你是一个独特且平衡的猎人。在某些维度上你展现出了均衡的特质，这让你在狩猎中能够灵活适应不同的局面。';
  const hasX = mbtiType.includes('X');
  const match = findBestWeapon(dimScores);

  const dimMax = 30;
  function dimBar(leftLabel, rightLabel, score, cls) {
    const pct = Math.round((score + dimMax) / (2 * dimMax) * 100);
    const isCenter = score === 0;
    return `
      <div class="dim-row">
        <span class="dim-label-left">${leftLabel}</span>
        <div class="dim-bar-track">
          <div class="dim-bar-fill ${cls}" style="width:${pct}%"></div>
        </div>
        <span class="dim-label-right">${rightLabel}</span>
        <span class="dim-percent">${score > 0 ? '+' + score : score}${isCenter ? ' 均衡' : ''}</span>
      </div>
    `;
  }

  // 武器推荐部分
  let weaponHTML = '';
  if (!match) {
    weaponHTML = `
      <div class="section-divider">🐱 艾露猫摇摇头</div>
      <div class="weapon-card">
        <p style="color:var(--text-dim);padding:20px;">
          你的维度分数完全中立，艾露猫无法确定你的专属武器……<br>
          或许你是个什么都想试试的自由猎人！<br>
          🐱："喵？你到底是哪种猎人啊？再测一次吧！"
        </p>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn-retry" onclick="retryQuiz()">🔄 重新测试</button>
        </div>
      </div>`;
  } else {
    const w = match.primary;
    weaponHTML = `
      <div class="section-divider">🐱 艾露猫的武器推荐</div>
      <div class="weapon-card">
        <div class="match-badge">⚔️ 匹配度 ${match.primaryPct}%</div>
        <div class="weapon-icon-wrap"><img src="${weaponSvg[w.id]}" alt="${w.name}" width="96" height="96"></div>
        <div class="weapon-name">${w.name}</div>
        <div class="weapon-name-en">${w.nameEn}</div>
        <div class="weapon-reason"><strong>🔍 为什么这把武器适合你</strong><br><br>${w.reason}</div>
        <div class="weapon-meme"><strong>😂 猎人锐评（热梗时间）</strong><br><br>${w.meme}</div>
        <div class="weapon-tags">${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="alt-weapons">
        备选武器：<span>${match.alts[0].weapon.name} (${match.alts[0].pct}%)</span> · <span>${match.alts[1].weapon.name} (${match.alts[1].pct}%)</span>
      </div>
      <div class="btn-row">
        <button class="btn-retry" onclick="retryQuiz()">🔄 重新测试</button>
        <button class="btn-share" onclick="shareResult('${mbtiType}', '${w.name}')">📋 分享结果</button>
      </div>`;
  }

  document.getElementById('result').innerHTML = `
    <div class="result-header">
      <div class="mbti-type-badge">${mbtiType}</div>
      <div class="mbti-name">${mbtiDescriptions[mbtiType] ? mbtiDescriptions[mbtiType].split('——')[0].replace('你是"','').replace('"','') : (cleanType ? mbtiDescriptions[cleanType].split('——')[0].replace('你是"','').replace('"','') : '自由猎人')}</div>
      ${hasX ? '<div style="font-size:12px;color:var(--gold-dim);margin-top:4px;">⚠️ 标X维度倾向不显著，结果仅供参考</div>' : ''}
    </div>

    <div class="dim-bars">
      ${dimBar('I', 'E', dimScores.ei, 'ei')}
      ${dimBar('S', 'N', dimScores.sn, 'sn')}
      ${dimBar('T', 'F', dimScores.tf, 'tf')}
      ${dimBar('J', 'P', dimScores.jp, 'jp')}
    </div>

    <div class="mbti-desc">${desc}</div>

    ${weaponHTML}

    <div class="footer">
      此测试仅供娱乐 · 武器无高下之分 · 艾露猫爱你<br>
      Monster Hunter Wilds &copy; CAPCOM
    </div>
  `;
}

// ==================== ACTIONS ====================
function startQuiz() {
  currentQuestion = 0;
  answers = new Array(TOTAL).fill(null);
  renderQuiz();
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function nextQuestion() {
  if (answers[currentQuestion] === null) {
    showToast('请先选择一个选项哦~');
    return;
  }
  if (currentQuestion < TOTAL - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    // Finished — check all answered
    const unanswered = answers.filter(a => a === null).length;
    if (unanswered > 0) {
      showToast('还有 ' + unanswered + ' 题未回答，请完成所有题目~');
      for (let i = 0; i < TOTAL; i++) {
        if (answers[i] === null) { currentQuestion = i; renderQuestion(); return; }
      }
    }
    renderResult();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function retryQuiz() {
  startQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResult(type, weapon) {
  const text = `🛡️ 我的狩魂性格是 ${type}！\n🐱 艾露猫推荐我的《怪物猎人：荒野》专属武器：${weapon}！\n👇 来测测你的：`;
  if (navigator.share) {
    navigator.share({ title: '狩魂性格检定', text: text, url: location.href })
      .catch(() => {});
  } else {
    navigator.clipboard.writeText(text + ' ' + location.href).then(() => {
      showToast('已复制分享内容！');
    });
  }
}

// ==================== INIT ====================
function initHeroWeaponGrid() {
  const grid = document.getElementById('heroWeaponGrid');
  if (!grid) return;

  // Reference layout: 4-col grid with MHW logo in row 2 center
  const order = [
    'gunlance', 'longsword', 'dualblades', 'huntinghorn',
    'swordshield', null, 'bow',           // null = logo (spans 2)
    'insectglaive', 'chargeblade', 'switchaxe', 'lance',
    'greatsword', 'heavybowgun', 'hammer', 'lightbowgun',
  ];

  grid.innerHTML = order.map(id => {
    if (id === null) {
      return '<div class="wp-logo-tile"><span class="mhw-logo-text">MONSTER HUNTER WILDS</span></div>';
    }
    const w = weapons.find(x => x.id === id);
    const svg = weaponSvg[id];
    return `<div class="wp-tile">
      <img src="${svg}" alt="${w ? w.name : id}" loading="lazy">
      <span class="wp-name">${w ? w.name : id}</span>
    </div>`;
  }).join('');
}
initHeroWeaponGrid();
renderHero();
</script>
